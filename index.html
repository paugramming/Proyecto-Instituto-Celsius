<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estudio - Inicio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div style="font-weight: bold; letter-spacing: 2px;">STUDYING</div>
        <nav class="nav-tabs">
            <a href="index.html" class="tab-link active">Inicio</a>
            <a href="formulario.html" class="tab-link">Formulario</a>
              <a href="examenes.html" class="tab-link">Examenes</a>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h1 style="font-size: 1rem; color: var(--texto-suave); margin: 0; text-align: center;">ESTUDIANDO MATEMÁTICA</h1>
            <div class="timer-display" id="tiempo">01:00:00</div>
            
            <button class="btn" id="btnInicio" onclick="iniciar()">Iniciar la sesión</button>
            <button class="btn btn-pausa" id="btnPausa" onclick="pausar()">Pausar</button>
            
            <div class="spotify-player">

    <h3 class="music-title">🎧 Lo-Fi para estudiar</h3>

    <iframe 
        style="border-radius:12px"
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8NTLI2TtZa6?utm_source=generator"
        width="100%"
        height="152"
        frameBorder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy">
    </iframe>

</div>
        </div>
    </div>

    <script>
        let segundos = 3600;
        let intervalo = null;

        function mostrarTiempo() {
            let h = Math.floor(segundos / 3600);
            let m = Math.floor((segundos % 3600) / 60);
            let s = segundos % 60;
            document.getElementById('tiempo').textContent = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function iniciar() {
            if (intervalo) return;
            
            intervalo = setInterval(() => {
                if (segundos > 0) {
                    segundos--;
                    mostrarTiempo();
                } else {
                    clearInterval(intervalo);
                    intervalo = null;
                    alert("¡Sesión terminada!");
                }
            }, 1000);
        }

        function pausar() {
            clearInterval(intervalo);
            intervalo = null;
        }
    </script>

</body>
</html>
